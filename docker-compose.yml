version: "3.9"

services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./worker:/app/worker
      - ./config:/app/config
      - ./data:/app/data
      - cerep-db:/app/data/db
    environment:
      - APP_ENV=development
      - DATABASE_URL=sqlite:///./data/db/cerep.db
      - KG_MODE=networkx
      - KG_BUILD_MODE=adapters
      - LOG_LEVEL=INFO
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    networks:
      - cerep-net

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - cerep-net

  # ── Ollama LLM ──────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - cerep-net
    # GPU passthrough (uncomment for NVIDIA GPU)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Neo4j (optional — enable for production KG) ─────────────────────────────
  # neo4j:
  #   image: neo4j:5.20-community
  #   ports:
  #     - "7474:7474"
  #     - "7687:7687"
  #   volumes:
  #     - neo4j-data:/data
  #   environment:
  #     - NEO4J_AUTH=neo4j/neo4j
  #   networks:
  #     - cerep-net

volumes:
  cerep-db:
  ollama-models:
  # neo4j-data:

networks:
  cerep-net:
    driver: bridge
